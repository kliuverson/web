<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categorías — FERREMATERIALES</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../../style/admin.css">
</head>

<body class="admin-body">

  <aside class="admin-sidebar">
    <div class="admin-sidebar-brand">
      <img src="../../assets/icons/logo_recortado.png" alt="Logo">
      <div>
        <div class="admin-brand-name">FERREMATERIALES</div>
        <div class="admin-brand-sub">Panel Admin</div>
      </div>
    </div>
    <nav class="admin-nav">
      <div class="admin-nav-label">General</div>
      <a href="dashboard.html" class="admin-nav-item"><span class="admin-nav-icon"></span> Dashboard</a>
      <div class="admin-nav-label">Catálogo</div>
      <a href="productos.html" class="admin-nav-item"><span class="admin-nav-icon"></span> Productos</a>
      <a href="categorias.html" class="admin-nav-item active"><span class="admin-nav-icon"></span> Categorías</a>
      <div class="admin-nav-label">Ventas</div>
      <a href="pedidos.html" class="admin-nav-item"><span class="admin-nav-icon"></span> Pedidos</a>
      <div class="admin-nav-label">Usuarios</div>
      <a href="usuarios.html" class="admin-nav-item"><span class="admin-nav-icon"></span> Usuarios</a>
      <div class="admin-nav-divider"></div>
      <a href="../index.html" class="admin-nav-item"><span class="admin-nav-icon"></span> Ver tienda</a>
      <a href="#" class="admin-nav-item admin-logout"><span class="admin-nav-icon"></span> Cerrar sesión</a>
    </nav>
  </aside>

  <div class="admin-content">
    <div class="admin-topbar">
      <div class="admin-page-title">Categorías</div>
      <div class="admin-user-badge" id="adminUserBadge">Admin</div>
    </div>

    <div class="admin-search-bar">
      <input type="text" id="buscar" class="admin-search-input" placeholder="Buscar categoría...">
      <button id="btnNuevaCategoria" class="admin-btn admin-btn-primary">+ Nueva categoría</button>
      <span style="margin-left:auto;font-size:12px;color:var(--muted);">
        Total: <strong id="totalCategorias" style="color:var(--text);">—</strong>
      </span>
    </div>

    <div style="padding:20px 28px;">
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:4px;overflow:hidden;">
        <table class="admin-table">
          <thead>
            <tr>
              <th style="width:70px;">#</th>
              <th>Nombre</th>
              <th>Descripción</th>
              <th style="width:190px;">Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaBody">
            <tr>
              <td colspan="4" class="admin-loading">Cargando...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- MODAL -->
  <div id="modal"
    style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;align-items:center;justify-content:center;">
    <div
      style="background:var(--bg2);border:1px solid var(--border2);border-radius:4px;padding:28px;width:100%;max-width:460px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;">
        <h2 id="modalTitulo"
          style="font-family:'Syne',sans-serif;font-weight:800;font-size:15px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text);">
        </h2>
        <button id="btnCerrarModal"
          style="background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;">✕</button>
      </div>
      <form id="formCategoria">
        <div class="admin-field" style="margin-bottom:14px;">
          <label for="inputNombre">Nombre</label>
          <input type="text" id="inputNombre" class="admin-input" placeholder="Ej: Herramientas eléctricas" required>
        </div>
        <div class="admin-field">
          <label for="inputDescripcion">Descripción</label>
          <textarea id="inputDescripcion" class="admin-textarea" placeholder="Descripción opcional..."></textarea>
        </div>
        <div class="admin-modal-actions">
          <button type="button" id="btnCancelar" class="admin-btn admin-btn-secondary">Cancelar</button>
          <button type="submit" id="btnGuardar" class="admin-btn admin-btn-primary">GUARDAR</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../../js/categorias.js"></script>
</body>

</html>
